name: Generate Daily Newsletters

on:
  schedule:
    - cron: '30 22 * * *'   # 4:00 AM IST (UTC+5:30) daily — accounts for GitHub scheduler delay
  workflow_dispatch:        # Manual trigger for testing
    inputs:
      force:
        description: 'Force regenerate even if today already exists'
        type: boolean
        default: false

permissions:
  contents: write           # Required to commit and push generated files

concurrency:
  group: generate
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate newsletters
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FORCE: ${{ inputs.force }}
        run: npx tsx scripts/generate-newsletter.ts

      - name: Commit and push new newsletters
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletters/
          if git diff --staged --quiet; then
            echo "No new newsletters generated."
          else
            git commit -m "clippings: daily newsletters for $(date +%Y-%m-%d)"
            git push
          fi
